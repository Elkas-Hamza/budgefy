<!DOCTYPE html>

<html class="dark" lang="fr"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- Modal Success Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-background/40 backdrop-blur-[2px] px-6">
<div class="max-w-md w-full bg-surface-container-high rounded-xl border border-outline-variant shadow-2xl p-8 relative overflow-hidden flex flex-col items-center text-center">
<!-- Abstract background glow for the modal -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-secondary/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-48 h-48 bg-primary/10 rounded-full blur-3xl"></div>
<!-- Glowing Success Icon -->
<div class="relative mb-6">
<div class="absolute inset-0 bg-secondary/20 blur-xl rounded-full scale-150"></div>
<div class="relative w-20 h-20 bg-secondary-container/20 rounded-full flex items-center justify-center border border-secondary/30">
<span class="material-symbols-outlined text-secondary text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Content -->
<h2 class="font-display-xl text-on-surface mb-3 tracking-tight">Opération Réussie</h2>
<p class="text-on-surface-variant font-body-lg mb-8 leading-relaxed">
                Votre transaction a été enregistrée avec succès dans votre budget personnel.
            </p>
<!-- Actions -->
<div class="w-full space-y-4">
<button class="w-full py-4 bg-primary-container text-on-primary-container font-body-lg rounded-xl hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-primary-container/20">
                    Retour au tableau de bord
                </button>
<button class="w-full py-3 text-slate-400 font-label-sm uppercase tracking-widest hover:text-white transition-colors active:opacity-70">
                    Fermer
                </button>
</div>
</div>

<footer class="fixed bottom-0 left-0 md:left-72 right-0 p-6 flex justify-center pointer-events-none select-none opacity-30">
